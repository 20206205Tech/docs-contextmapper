name: Generate Architecture Diagrams

on:
  push:
    branches:
      - main
    # paths:
    #   - '**/*.cml'

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # KHÔNG cần setup Java, KHÔNG cần tải file, KHÔNG cần build mã nguồn.
      - name: Generate Diagrams via Docker
        run: |
          mkdir -p docs/diagrams
          
          # 1. Vẽ sơ đồ PlantUML
          # Lệnh này gọi container, gắn (mount) thư mục code hiện tại vào /workspace bên trong container
          docker run --rm -v ${{ github.workspace }}:/workspace contextmapper/context-mapper-cli \
            generate -i /workspace/architecture.cml -g plantuml -o /workspace/docs/diagrams
            
          # 2. Vẽ sơ đồ Context Map đồ họa
          docker run --rm -v ${{ github.workspace }}:/workspace contextmapper/context-mapper-cli \
            generate -i /workspace/architecture.cml -g context-map -o /workspace/docs/diagrams

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/
          git commit -m "docs: auto-generate architecture diagrams via Docker" || echo "No changes to commit"
          git push