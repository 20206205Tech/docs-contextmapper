name: Generate Architecture Diagrams

on:
  push:
    branches:
      - main
    # paths:
    #   - '**/*.cml'

# SỬA LỖI 403: Cấp quyền Ghi cho GitHub Actions bot để push file vẽ sơ đồ lên repo
permissions:
  contents: write

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download and Setup Context Mapper CLI
        run: |
          echo "🚀 Tải Context Mapper CLI v6.12.0 từ Maven Central..."
          wget -q https://repo1.maven.org/maven2/org/contextmapper/context-mapper-cli/6.12.0/context-mapper-cli-6.12.0.tar -O cm-cli.tar
          echo "📦 Giải nén file tar..."
          tar -xf cm-cli.tar
          echo "🔗 Thiết lập quyền thực thi..."
          chmod +x context-mapper-cli-6.12.0/bin/cm
          ln -s "$PWD/context-mapper-cli-6.12.0/bin/cm" ./cm
          echo "✅ Cài đặt thành công!"
          ./cm --version || echo "Sẵn sàng chạy!"

      # THÊM BƯỚC NÀY: Cài đặt Graphviz cho máy ảo Ubuntu
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Generate Diagrams
        run: |
          mkdir -p docs/diagrams
          
          # Sinh sơ đồ PlantUML và Context Map
          # ./cm generate -i system-architecture.cml -g plantuml -o docs/diagrams
          ./cm generate -i system-architecture.cml -g context-map -o docs/diagrams

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/
          git commit -m "docs: auto-generate architecture diagrams for v6.12.0" || echo "No changes to commit"
          git push