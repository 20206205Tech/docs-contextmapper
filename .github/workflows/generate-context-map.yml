name: Generate Architecture Diagrams

on:
  push:
    branches:
      - main
    # paths:
    #   - '**/*.cml' # Workflow chỉ chạy khi có sự thay đổi ở file kiến trúc

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download Context Mapper CLI
        run: |
          echo "Đang tìm kiếm phiên bản Context Mapper CLI khả dụng mới nhất..."
          
          # 1. Gọi API lấy TOÀN BỘ danh sách lịch sử releases (thay vì chỉ lấy bản 'latest' đang bị hỏng)
          API_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/ContextMapper/context-mapper-cli/releases)
          
          # 2. Dùng bộ lọc jq thông minh:
          # - [.[] | select(.assets | length > 0)][0]: Duyệt qua các release, bỏ qua những bản không đính kèm file (như v6.12.0), chọn bản hợp lệ đầu tiên (mới nhất).
          # - Lọc trong bản hợp lệ đó để lấy link .zip hoặc .tar
          DOWNLOAD_URL=$(echo "$API_RESPONSE" | jq -r '[.[] | select(.assets | type == "array" and length > 0)][0].assets[] | select(.name | test("zip$|tar$|tar.gz$")) | .browser_download_url' | head -n 1)
          
          # 3. Kiểm tra an toàn
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "LỖI NGIÊM TRỌNG: Không tìm thấy link tải khả dụng ở bất kỳ phiên bản nào!"
            exit 1
          fi
          
          echo "✅ Đã tự động chuyển hướng tới link tải an toàn: $DOWNLOAD_URL"
          
          # 4. Tải và giải nén
          if [[ "$DOWNLOAD_URL" == *".zip" ]]; then
            wget -q "$DOWNLOAD_URL" -O cm-cli.zip
            unzip -q cm-cli.zip
          else
            wget -q "$DOWNLOAD_URL" -O cm-cli.tar
            tar -xf cm-cli.tar
          fi
          
          # 5. Cấp quyền thực thi và tạo alias
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "context-mapper-cli-*" | head -n 1)
          chmod +x "$EXTRACTED_DIR/bin/cm"
          ln -s "$PWD/${EXTRACTED_DIR:2}/bin/cm" ./cm 
      - name: Generate Diagrams
        run: |
          mkdir -p docs/diagrams
          
          # 1. Tự động sinh các sơ đồ class, component bằng PlantUML
          ./cm generate -i architecture.cml -g plantuml -o docs/diagrams
          
          # 2. Tự động sinh sơ đồ Context Map đồ họa (Graphviz)
          ./cm generate -i architecture.cml -g context-map -o docs/diagrams

      - name: Commit and Push changes
        run: |
          # Commit các file ảnh/PlantUML sinh ra ngược lại vào repository
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/
          git commit -m "docs: auto-generate architecture diagrams from CML" || echo "No changes to commit"
          git push