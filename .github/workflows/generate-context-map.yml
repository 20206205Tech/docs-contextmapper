name: Generate Architecture Diagrams

on:
  push:
    branches:
      - main
    # paths:
    #   - '**/*.cml' # Workflow chỉ chạy khi có sự thay đổi ở file kiến trúc

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download Context Mapper CLI 
        run: |
          echo "Đang tìm kiếm phiên bản Context Mapper CLI khả dụng..."
          
          # 1. Lấy dữ liệu từ API
          API_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/ContextMapper/context-mapper-cli/releases)
          
          # 2. Xử lý jq an toàn (không dùng index [0] để tránh lỗi null)
          # Tìm tất cả các release có chứa assets, sau đó lọc lấy link tải file tar/zip đầu tiên (mới nhất)
          DOWNLOAD_URL=$(echo "$API_RESPONSE" | jq -r '
            if type == "array" then
              .[] | select(.assets != null and (.assets | length > 0)) | .assets[] | select(.name | endswith(".zip") or endswith(".tar") or endswith(".tar.gz")) | .browser_download_url
            else
              empty
            end
          ' | head -n 1)
          
          # 3. Kịch bản dự phòng (Fallback) nếu API thất bại hoặc không có file
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "⚠️ Cảnh báo: API GitHub không trả về link tải hợp lệ."
            echo "Log phản hồi API (rút gọn): $(echo "$API_RESPONSE" | head -n 15)"
            echo "🔄 Tự động kích hoạt cơ chế Fallback: Sử dụng phiên bản ổn định v6.11.0..."
            DOWNLOAD_URL="https://github.com/ContextMapper/context-mapper-cli/releases/download/v6.11.0/context-mapper-cli.tar"
          fi
          
          echo "✅ Đang tải Context Mapper từ: $DOWNLOAD_URL"
          
          # 4. Tải và giải nén
          if [[ "$DOWNLOAD_URL" == *".zip" ]]; then
            wget -q "$DOWNLOAD_URL" -O cm-cli.zip
            unzip -q cm-cli.zip
          else
            wget -q "$DOWNLOAD_URL" -O cm-cli.tar
            tar -xf cm-cli.tar
          fi
          
          # 5. Tìm và thiết lập quyền thực thi
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "context-mapper-cli-*" | head -n 1)
          
          if [ -z "$EXTRACTED_DIR" ]; then
            echo "LỖI NGIÊM TRỌNG: Quá trình giải nén thất bại hoặc cấu trúc thư mục không đúng."
            exit 1
          fi
          
          chmod +x "$EXTRACTED_DIR/bin/cm"
          ln -s "$PWD/${EXTRACTED_DIR:2}/bin/cm" ./cm
          
          echo "Cài đặt Context Mapper CLI thành công!"
          ./cm --version || echo "Sẵn sàng chạy lệnh cm"
      - name: Generate Diagrams
        run: |
          mkdir -p docs/diagrams
          
          # 1. Tự động sinh các sơ đồ class, component bằng PlantUML
          ./cm generate -i architecture.cml -g plantuml -o docs/diagrams
          
          # 2. Tự động sinh sơ đồ Context Map đồ họa (Graphviz)
          ./cm generate -i architecture.cml -g context-map -o docs/diagrams

      - name: Commit and Push changes
        run: |
          # Commit các file ảnh/PlantUML sinh ra ngược lại vào repository
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/
          git commit -m "docs: auto-generate architecture diagrams from CML" || echo "No changes to commit"
          git push