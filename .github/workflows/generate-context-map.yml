name: Generate Architecture Diagrams

on:
  push:
    branches:
      - main
    # paths:
    #   - '**/*.cml' # Workflow chỉ chạy khi có sự thay đổi ở file kiến trúc

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # - name: Download Context Mapper CLI
      #   run: |
